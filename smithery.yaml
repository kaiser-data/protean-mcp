name: Protean MCP
qualifiedName: kaiser-data/protean-mcp
description: >
  The shape-shifting MCP hub. mount() into any MCP server at runtime across 7 registries.
  No config files. No restarts. Search → mount → call → unmount in seconds.
homepage: https://github.com/kaiser-data/protean-mcp
license: MIT
transport: stdio

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      SMITHERY_API_KEY:
        type: string
        description: >
          Smithery API key for searching and accessing 3,000+ verified MCP servers.
          Get yours at smithery.ai/account/api-keys
        required: false
    additionalProperties: false
  commandFunction: |
    (config) => ({
      command: "python",
      args: ["server.py"],
      env: {
        ...(config.SMITHERY_API_KEY ? { SMITHERY_API_KEY: config.SMITHERY_API_KEY } : {})
      }
    })

tools:
  - name: search
    description: Search MCP servers across 7 registries (official, npm, PyPI, Glama, GitHub, Smithery)
  - name: inspect
    description: Show a server's tools, credentials, and token cost
  - name: call
    description: Call any tool on any MCP server (HTTP or stdio)
  - name: run
    description: Run a tool from a local npm/pip package directly
  - name: mount
    description: Take a server's form — register its tools directly in your context
  - name: unmount
    description: Drop current form and return to base Protean tools
  - name: connect
    description: Connect a persistent hardware/audio MCP server (process stays alive)
  - name: release
    description: Release a persistent connection and kill its process
  - name: status
    description: Show current form, connections, token stats
  - name: fetch
    description: Fetch a URL with compressed output (~500 tokens vs 25K raw)
  - name: auto
    description: Auto-discover and call the best server for a task
  - name: key
    description: Save an API key to .env for persistent use
  - name: skill
    description: Inject a Smithery skill prompt into context
  - name: test
    description: Validate any MCP server and return a quality score 0-100
  - name: bench
    description: Benchmark a tool's latency (p50, p95, min, max)
