name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}  # allow manual re-run (e.g. when one publish target fails)

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check NPM_TOKEN
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set. Add it at: https://github.com/kaiser-data/kitsune-mcp/settings/secrets/actions"
            exit 1
          fi
          echo "NPM_TOKEN is set (${#TOKEN} chars)"
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Authenticate with npm
        run: npm config set //registry.npmjs.org/:_authToken "${{ secrets.NPM_TOKEN }}"

      - name: Publish to npm
        run: npm publish --access public

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [pypi, npm]   # wait for both packages to be live first
    permissions:
      id-token: write    # GitHub OIDC — no stored secret needed
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
