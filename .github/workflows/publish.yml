name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: npm publish --access public

  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [pypi, npm]   # wait for both packages to be live first
    permissions:
      id-token: write    # GitHub OIDC — no stored secret needed
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher-linux-amd64 \
            -o /usr/local/bin/mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher

      - name: Publish to MCP Registry
        run: mcp-publisher publish --auth github-oidc
